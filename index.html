<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("/sail/sw.js")
    </script>
</head>
<body>
    <style>
        /* hide the original proxy iframe and make the vanta embed fill most of the viewport
           leaving only the top search bar visible as a sliver */
        #frame { display: none !important; }
        #vanta-embed {
            position: fixed;
            top: 56px; /* leave space for the top search bar */
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: calc(100vh - 56px);
            border: 0;
            background: #cfcfcf;
            border-radius: 0;
        }
        /* fallback for other iframes */
        iframe:not(#vanta-embed) { display: none; }
    </style>

    <iframe src="" frameborder="0" id="frame"></iframe>
        <!-- CENTERED SEARCH + EMBEDDED VANTA -->
        <div class="main-center">
            <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="uv-search" type="text" placeholder="Search Vanta..." />
                    <button onclick="(function(){const v=document.getElementById('uv-search').value.trim(); if(!v) return; let u=v; if(!u.includes('.')) u='https://www.google.com/search?q='+encodeURIComponent(u); else if(!u.startsWith('http://') && !u.startsWith('https://')) u='https://'+u; document.getElementById('vanta-embed').src=u; })()">Go</button>
                </div>

                <div class="content-area" style="width:100%; max-width:1200px; margin-top:18px;">
                    <iframe id="vanta-embed" src="vanta.html"></iframe>
                </div>
            </div>
        </div>

        <script>
        document.getElementById('uv-search').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const v = this.value.trim();
                if (!v) return;
                let u = v;
                if (!u.includes('.')) u = 'https://www.google.com/search?q=' + encodeURIComponent(u);
                else if (!u.startsWith('http://') && !u.startsWith('https://')) u = 'https://' + u;
                document.getElementById('vanta-embed').src = u;
            }
        });
        </script>

    <script>
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js") // you could always use epoxy, but libcurl is better imo
        connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }]) // use some other wisp here

        const frame = document.getElementById("frame")
        const bar = document.getElementById("bar")

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/sail/go/" // feel free to change this later
        })
        scramjet.init()

        // top-left search removed; keep proxy frame and scramjet initialization
    </script>  
    
</body>
</html>
