<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("/sail/sw.js")
    </script>
</head>
<body>
    <style>
        /* Vanta covers the page as the homepage background (full viewport) */
        #vanta-embed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #cfcfcf;
            display: block;
            z-index: 1000;
        }

        /* Floating square overlay for the proxy iframe */
        #frame-overlay {
            display: none;
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 420px;
            height: 420px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            z-index: 1500;
        }

        #frame-overlay .close {
            position: absolute;
            right: 6px;
            top: 6px;
            z-index: 1210;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 18px;
            line-height: 0;
        }

        #frame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>

    <div id="frame-overlay">
        <button class="close" id="close-overlay">×</button>
        <iframe src="" frameborder="0" id="frame"></iframe>
    </div>

    <iframe src="vanta.html" frameborder="0" id="vanta-embed"></iframe>
    <!-- LEFT-CORNER SEARCHBAR -->
    <div class="search-wrapper" style="position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:1600;">
        <input type="text" placeholder="url" id="bar" style="min-width:320px; padding:6px 8px;"> <button onclick="nav()">Go</button>
        <button onclick="resetToVanta()" style="margin-left:8px;">Reset</button>
    </div>

        

    <script>
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js") // you could always use epoxy, but libcurl is better imo
        connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }]) // use some other wisp here

        const frame = document.getElementById("frame")
        const bar = document.getElementById("bar")
        const overlay = document.getElementById("frame-overlay")
        const closeOverlayBtn = document.getElementById("close-overlay")

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/sail/go/" // feel free to change this later
        })
        scramjet.init()

        function nav() {
            let url = bar.value.trim()
            if (!url) return;

            if (!url.includes(".")) {
                url = "https://search.brave.com/search?q=" + encodeURIComponent(url)
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url
            }
            // show proxy in floating overlay without navigating away
            overlay.style.display = 'block'
            frame.src = scramjet.encodeUrl(url)
        }

        function resetToVanta() {
            // close overlay and clear the input
            overlay.style.display = 'none'
            frame.src = ''
            bar.value = '';
        }

        closeOverlayBtn.addEventListener('click', () => {
            overlay.style.display = 'none'
            frame.src = ''
        })

        bar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                nav()
            }
        })
    </script>  
    
</body>
</html>
